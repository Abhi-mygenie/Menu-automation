# Menu Automation - production docker-compose
# Usage:
#   docker-compose up --build -d
#   docker-compose logs -f
#   docker-compose down
#
# Required env (or .env file at repo root):
#   MONGO_INITDB_ROOT_USERNAME=admin
#   MONGO_INITDB_ROOT_PASSWORD=changeme
#   DB_NAME=menu_automation
#   CORS_ORIGINS=http://localhost
#   REACT_APP_BACKEND_URL=http://localhost   # baked into the frontend build

version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: menu-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: menu-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongo:27017/?authSource=admin
      DB_NAME: ${DB_NAME:-menu_automation}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DATASETS_DIR: /app/datasets
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Empty -> nginx proxies /api to backend on the same origin (recommended)
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
    container_name: menu-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
    driver: local
